name: Lint and Type Check

on:
  push:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright

      - name: Run Ruff
        run: ruff check .

      - name: Run Pyright
        run: pyright .
